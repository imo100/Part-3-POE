<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Gallery | Charles Greenway</title>

  <!-- CSS Link -->
  <link rel="stylesheet" href="CSS/style.css">
</head>

<body>

<div class="container">

  <!-- HEADER -->
  <header>

    <div class="header-container">

      <div class="logo-section">
        <img src="Images/Charles Greenway logo.png" alt="Website Logo" width="120">
        <h1>Charles Greenway</h1>
      </div>

      <div class="nav-section">
        <nav>
          <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="enquiry.html">Enquiry</a></li>
            <li><a href="contact.html">Contact</a></li>
          </ul>
        </nav>
      </div>

    </div>

  </header>

  <!-- MAIN -->
  <main>

    <section class="content-box">

      <h2>Our Work Gallery</h2>
      <p>Click an image to view it larger.</p>

      <!-- STATIC GALLERY IMAGES -->
      <div class="gallery">

        <img src="Images/Hero.jpg" alt="Garden Hero Image">
        <img src="Images/Img1.jpg" alt="Garden Work 1">
        <img src="Images/Img2.jpg" alt="Garden Work 2">
        <img src="Images/Img 3.jpg" alt="Garden Work 3">
        <img src="Images/Img4.jpg" alt="Garden Work 4">
        <img src="Images/Img5.jpg" alt="Garden Work 5">
        <img src="Images/Img6.jpg" alt="Garden Work 6">
        <img src="Images/Img7.jpg" alt="Garden Work 7">

      </div>

    </section>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox">

      <span class="close">&times;</span>

      <img class="lightbox-content" id="lightbox-img">

      <div class="caption" id="caption"></div>

      <div class="controls">
        <span class="prev">&#10094;</span>
        <span class="next">&#10095;</span>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer>
    <div class="footer-container">
      <p>&copy; 2026 Website Project/POE</p>
    </div>
  </footer>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
